server {
    listen 80;

    location /game-client/ {
        alias /usr/share/nginx/html/game-client/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /game-ui/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /game-ui/index.html;
    }

    location /api/ {
        proxy_pass http://game-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /socket {
        proxy_pass http://game-server:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy false;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;       
        add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' https://cdn.socket.io/4.8.1/socket.io.min.js;";
    }
}


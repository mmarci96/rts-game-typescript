apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
  namespace: rts-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reverse-proxy
  template:
    metadata:
      labels:
        app: reverse-proxy
    spec:
      containers:
        - name: reverse-proxy
          image: mmarci96/reverse-proxy:latest
          ports:
            - containerPort: 80

apiVersion: v1
kind: Service
metadata:
  name: reverse-proxy
  namespace: test-proxy
spec:
  type: NodePort
  selector:
    app: reverse-proxy
  ports:
    - port: 80        # Service port (inside cluster)
      targetPort: 80  # Container port (inside Pod)
      nodePort: 30080 # External port on your Minikube node


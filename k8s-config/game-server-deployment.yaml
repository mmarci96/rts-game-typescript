apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-server
  namespace: rts-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-server
  template:
    metadata:
      labels:
        app: game-server
    spec:
      containers:
        - name: game-server
          image: mmarci96/game-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: MONGO_URI
              value: "mongodb://mongo-service:27017/rts-game-db"
            - name: REDIS_HOST
              value: "redis" 
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"

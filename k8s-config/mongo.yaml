apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: test-proxy
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo

---
apiVersion: v1
kind: Service
metadata:
  namespace: test-proxy
  name: mongo-service
spec:
  type: ClusterIP
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
